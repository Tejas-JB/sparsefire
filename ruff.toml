line-length = 100
target-version = "py311"

[lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "RET"]
ignore = ["E501", "N812"]  # N812: F = torch.nn.functional is universal convention

[lint.per-file-ignores]
"tests/**" = ["N802"]  # tests mock external C APIs with mixed-case method names

[format]
quote-style = "double"
